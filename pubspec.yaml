name: dogst_ui
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.7.0


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.15.1
  firebase_auth: ^5.6.2
  google_sign_in: '>=6.0.0 <7.0.0'
  lottie: ^3.3.1
  usage_stats: ^1.3.1
  installed_apps: ^1.6.0
  http: ^1.4.0
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.5
  google_nav_bar: ^5.0.7
  cached_network_image: ^3.4.1
  lucide_icons: ^0.257.0
  url_launcher: ^6.3.2
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  

flutter_icons:
  android: true
  ios: true
  image_path: "lib/images/logo.png"
  
  flutter_lints: ^5.0.0


flutter:

  
  uses-material-design: true
  assets:
  - lib/images/
  - assets/

